  <!-- GALLERY SECTION -->
  <section class="gallery-section" id="gallery">

    <h2>Gallery</h2>

    <div class="slider-container">

        <button class="slide-btn prev">&#10094;</button>

        <div class="slider">

            <div class="slide active">
              <div class="blur-bg" 
              style="background-image: url('images/standoutsideumbrella.png');">
              </div>
              <img src="images/standoutsideumbrella.png">
            </div>
            <div class="slide">
              <div class="blur-bg" 
              style="background-image: url('images/KLOutside3.jpg');">
              </div>
              <img src="images/KLOutside3.jpg">
            </div>
            <div class="slide">
              <div class="blur-bg" 
              style="background-image: url('images/AIbananas.png');">
              </div>
              <img src="images/AIbananas.png">
            </div>
            <div class="slide">
              <div class="blur-bg" 
              style="background-image: url('images/AiStandwedding.png');">
              </div>
              <img src="images/AiStandwedding.png">
            </div>
            <div class="slide">
              <div class="blur-bg" 
              style="background-image: url('images/squeezebottle.jpeg');">
              </div>
              <img src="images/squeezebottle.jpeg">
            </div>
            <div class="slide">
              <div class="blur-bg" 
              style="background-image: url('images/funstand.jpeg');">
              </div>
              <img src="images/funstand.jpeg">
            </div>
            <div class="slide">
              <div class="blur-bg" 
              style="background-image: url('images/KLinsidestand.jpeg');">
              </div>
              <img src="images/KLinsidestand.jpeg">
            </div>

        </div>

        <button class="slide-btn next">&#10095;</button>

    </div>

</section>
<script>

const slides = document.querySelectorAll(".slide");

const nextBtn = document.querySelector(".next");
const prevBtn = document.querySelector(".prev");

let current = 0;

/* NEXT */

nextBtn.addEventListener("click", () => {

    slides[current].classList.remove("active");

    current++;

    if(current >= slides.length){
        current = 0;
    }

    slides[current].classList.add("active");
});

/* PREVIOUS */

prevBtn.addEventListener("click", () => {

    slides[current].classList.remove("active");

    current--;

    if(current < 0){
        current = slides.length - 1;
    }

    slides[current].classList.add("active");
});

</script>
</body>
